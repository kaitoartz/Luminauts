<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LumiNauts - Exploración Educativa Estelar</title>
  
  <!-- Google Fonts: Nunito & Quicksand -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Nunito', 'system-ui', 'sans-serif'],
            display: ['Quicksand', 'system-ui', 'sans-serif'],
          },
          colors: {
            primary: {
              DEFAULT: 'var(--color-primary)',
              hover: 'var(--color-primary-hover)',
            },
            secondary: 'var(--color-secondary)',
            tertiary: 'var(--color-tertiary)',
            accent: 'var(--color-accent)',
            border: 'var(--color-border)',
            zinc: {
              50: 'var(--zinc-50)',
              100: 'var(--zinc-100)',
              150: 'var(--zinc-150)',
              200: 'var(--zinc-200)',
              300: 'var(--zinc-300)',
              350: 'var(--zinc-350)',
              400: 'var(--zinc-400)',
              500: 'var(--zinc-500)',
              550: 'var(--zinc-550)',
              600: 'var(--zinc-600)',
              650: 'var(--zinc-650)',
              700: 'var(--zinc-700)',
              750: 'var(--zinc-750)',
              800: 'var(--zinc-800)',
              850: 'var(--zinc-850)',
              900: 'var(--zinc-900)',
              950: 'var(--zinc-950)',
            }
          },
          animation: {
            'appear': 'appear 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'appear-zoom': 'appear-zoom 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'float': 'float 6s ease-in-out infinite',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'shimmer': 'shimmer 1.5s infinite linear',
          },
          keyframes: {
            appear: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            'appear-zoom': {
              '0%': { opacity: '0', transform: 'scale(0.95)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-20px)' },
            },
            shimmer: {
              '0%': { transform: 'translateX(-100%)' },
              '100%': { transform: 'translateX(100%)' },
            }
          }
        }
      }
    }
  </script>
  
  <!-- Global Styles -->
  

  <!-- ═══ UI COMPONENT LIBRARY (Namespaced ep-*) ═══ -->
  

  <!-- React & ReactDOM -->
  
  
  <script>
    // Lucide React UMD expects lowercase 'react' global
    window.react = window.React;
  </script>
  
  <!-- Babel -->
  
  
  <!-- Framer Motion -->
  
  
  <!-- Lucide Icons -->
  

  <!-- GSAP & ScrollTrigger -->
  
  
  <!-- model-viewer for 3D GLTF/GLB models -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  
</body>
</html>
