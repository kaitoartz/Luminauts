<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduPlay - Portal Educativo Gamificado</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Söhne', 'Avenir Next', 'system-ui', 'sans-serif'],
          },
          animation: {
            'appear': 'appear 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'appear-zoom': 'appear-zoom 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'float': 'float 6s ease-in-out infinite',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'shimmer': 'shimmer 1.5s infinite linear',
          },
          keyframes: {
            appear: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            'appear-zoom': {
              '0%': { opacity: '0', transform: 'scale(0.95)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-20px)' },
            },
            shimmer: {
              '0%': { transform: 'translateX(-100%)' },
              '100%': { transform: 'translateX(100%)' },
            }
          }
        }
      }
    }
  </script>
  
  <!-- Global Styles -->
  <style>
    :root {
      --bg: #f8fafc;
    }
    body {
      background-color: var(--bg);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    
    .glass-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
    }
    
    .gradient-text {
      background: linear-gradient(135deg, #2563eb, #06b6d4, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script>
    // Lucide React UMD expects lowercase 'react' global
    window.react = window.React;
  </script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
  
  <!-- Framer Motion -->
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide-react@0.292.0/dist/umd/lucide-react.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { motion, AnimatePresence, useMotionValue, useTransform, useSpring } = window.Motion;
    const { ChevronRight, Star, Play, Award, Zap, BookOpen, FlaskConical, Trophy, User, ArrowRight, CheckCircle2, XCircle, Gamepad2, Brain, Compass, Users, Sparkles, Code, Globe, Shield } = window.LucideReact;

    // --- MOCK DATA ---
    const MOCK_USER = {
      name: "Leo",
      avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Leo&backgroundColor=ffdfbf",
      level: 12,
      xp: 4500,
      nextLevelXp: 5000,
      streak: 5,
      completedChallenges: 34,
      badges: [
        { id: 1, name: "Matemático Veloz", icon: Zap, color: "text-yellow-500", bg: "bg-yellow-100" },
        { id: 2, name: "Lector Curioso", icon: BookOpen, color: "text-blue-500", bg: "bg-blue-100" },
        { id: 3, name: "Científico Loco", icon: FlaskConical, color: "text-green-500", bg: "bg-green-100" }
      ]
    };

    const MOCK_GAMES = [
      { id: "g1", title: "Aventura Matemática", subject: "Matemáticas", level: "8-10", duration: "10 min", points: 150, color: "from-blue-500 to-cyan-400", bg: "bg-blue-50", icon: Zap, image: "g1", description: "Resuelve acertijos matemáticos y sube de nivel entrenando tu cerebro." },
      { id: "g2", title: "Memoria Espacial", subject: "Memoria", level: "5-7", duration: "5 min", points: 100, color: "from-purple-500 to-pink-400", bg: "bg-purple-50", icon: Brain, image: "g2", description: "Pon a prueba tu retención visual y memoriza los patrones en el espacio." },
      { id: "g3", title: "Laboratorio Químico", subject: "Ciencias", level: "11-13", duration: "15 min", points: 200, color: "from-green-500 to-emerald-400", bg: "bg-green-50", icon: FlaskConical, image: "g3", description: "Combina elementos y experimenta en nuestro laboratorio virtual interactivo." },
      { id: "g4", title: "Lógica de Bloques", subject: "Programación", level: "11-13", duration: "20 min", points: 250, color: "from-orange-500 to-yellow-400", bg: "bg-orange-50", icon: Code, image: "g4", description: "Aprende las bases de la programación ordenando bloques de código lógico." },
      { id: "g5", title: "Palabras Mágicas", subject: "Lectura", level: "5-7", duration: "10 min", points: 120, color: "from-red-500 to-rose-400", bg: "bg-red-50", icon: BookOpen, image: "g5", description: "Completa oraciones y expande tu vocabulario de forma divertida." },
      { id: "g6", title: "Safari en Inglés", subject: "Inglés", level: "8-10", duration: "15 min", points: 180, color: "from-indigo-500 to-violet-400", bg: "bg-indigo-50", icon: Globe, image: "g6", description: "Explora la sabana y aprende los nombres de los animales en inglés." }
    ];

    // Mapeo de previsualizaciones (GIFs / Imágenes) optimizados con Play-on-Hover
    const PREVIEW_IMAGES = {
      "g1": "https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExbnBub3J5MTV1dTA2c3kzeHJ6azIwYXdoaXRlMjNjZmdpMnpiaGU3diZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/71fMwwGrFRszyoHhUy/giphy_s.gif",
      "g2": "https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExd2Q5MnNrY3Vxc3VkNGk3NXA5M21ubHhvbjJuazJ3enFqdHpuamNwcyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/f0Dy5NDc1jBzpcbff9/giphy_s.gif",
      "g3": "https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExamdvNDV2b3J1Y3Q2OHNpd3A1MWV3NnVtbW14d2tveTllOTkyb2gyZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/e9BAkE9fnOEHgddk15/giphy_s.gif",
      "g4": "https://i.vimeocdn.com/video/2111149424-80e3b2974f1fd674f85bde22bcccedd7b2f0d26312df70e42dd7273e55360976-d_640.jpg",
      "g5": "https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExMDlvZ2dleXJ5YXl6bWI2OWNsbDJvNzRuNTh3ZHFrc3BmNnY2d2xrMyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/qX9oszuvxWoMwmVl8x/giphy_s.gif",
      "g6": "https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExcnJ4cnFqczJwcjE4cmd4YnUwbTlmNjc5dDQ0cWxiMHNzcjhmZGVoMyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/2xD3RrcxB20kTDuWeY/giphy_s.gif",
      "crehabitat_thumb.jpg": "https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExemgwZmJsNm5qc29qZnBrYnpiYWM0YXBoazc4YjhtejYwczI4bm82MyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/MbQPlY8F3nTuXldD4z/giphy_s.gif",
      "extintor_thumb.jpg": "https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExOWJlNTdzbGw3Mjg4c2p6M3V0ZnJjcGtvZzk3ZTdvaDR6enY5eHQ1ZiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/vEHJ3rEPheP5JjpktJ/giphy.gif"
    };

    const getImageUrl = (imageVal, id, isHovered) => {
      let url = PREVIEW_IMAGES[imageVal] || PREVIEW_IMAGES[id] || imageVal;
      if (!url) return null;
      if (isHovered && url.includes('_s.gif')) {
        return url.replace('_s.gif', '.gif');
      }
      return url;
    };

    const parseApiResponsePayload = (rawData) => {
      if (Array.isArray(rawData)) return rawData;
      if (typeof rawData !== 'string') return [];

      const normalized = rawData.trim();
      const parsed = [];
      const markdownRegex = /(?:\d+)?titulo"([^"]+)"descripcion"([^"]+)"imagen"\[([^\]]+)\]\(([^\)]+)\)"/g;
      let match;
      while ((match = markdownRegex.exec(normalized)) !== null) {
        parsed.push({ titulo: match[1], descripcion: match[2], imagen: match[4] || match[3] });
      }

      if (parsed.length) return parsed;

      const fallbackRegex = /(?:\d+)?titulo"([^"]+)"descripcion"([^"]+)"imagen"([^"]+)"/g;
      while ((match = fallbackRegex.exec(normalized)) !== null) {
        let imageUrl = match[3];
        const mdMatch = imageUrl.match(/\[([^\]]+)\]\(([^\)]+)\)/);
        if (mdMatch) imageUrl = mdMatch[2] || mdMatch[1];
        parsed.push({ titulo: match[1], descripcion: match[2], imagen: imageUrl });
      }

      return parsed;
    };

    const MOCK_QUIZ = {
      title: "Aventura Matemática",
      questions: [
        { id: 1, question: "¿Cuánto es 7 + 8?", options: ["14", "15", "16", "13"], correct: 1 },
        { id: 2, question: "Si tienes 3 manzanas y te dan 4 más, ¿cuántas tienes?", options: ["6", "8", "7", "9"], correct: 2 },
        { id: 3, question: "¿Cuál es el doble de 6?", options: ["10", "12", "14", "18"], correct: 1 }
      ]
    };

    // --- REUSABLE COMPONENTS ---
    const Button = ({ children, variant = 'primary', size = 'md', className = '', onClick, ...props }) => {
      const base = "inline-flex items-center justify-center rounded-2xl font-bold transition-all duration-300 relative overflow-hidden group";
      const variants = {
        primary: "bg-blue-600 text-white shadow-[0_8px_30px_rgb(37,99,235,0.3)] hover:shadow-[0_8px_30px_rgb(37,99,235,0.5)] hover:-translate-y-1",
        secondary: "bg-white text-zinc-800 border border-zinc-200 hover:border-zinc-300 hover:bg-zinc-50 shadow-sm hover:-translate-y-1",
        ghost: "bg-transparent text-zinc-600 hover:bg-zinc-100 hover:text-zinc-900",
        glow: "bg-zinc-900 text-white shadow-[0_0_40px_rgba(255,255,255,0.3)] hover:shadow-[0_0_60px_rgba(255,255,255,0.5)] border border-zinc-700 hover:-translate-y-1"
      };
      const sizes = { sm: "px-4 py-2 text-sm", md: "px-6 py-3 text-base", lg: "px-8 py-4 text-lg" };
      
      return (
        <motion.button 
          whileTap={{ scale: 0.95 }}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`} 
          onClick={onClick}
          {...props}
        >
          {variant === 'primary' && <span className="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]" />}
          <span className="relative flex items-center justify-center gap-2">{children}</span>
        </motion.button>
      );
    };

    const Badge = ({ children, className = '' }) => (
      <span className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold ${className}`}>
        {children}
      </span>
    );

    const PremiumGameCard = ({ id, title, subject, level, duration, points, color, bg, icon: Icon, image, description, onClick }) => {
      const x = useMotionValue(0);
      const y = useMotionValue(0);
      const [isHovered, setIsHovered] = useState(false);

      const mouseXSpring = useSpring(x);
      const mouseYSpring = useSpring(y);

      const rotateX = useTransform(mouseYSpring, [-0.5, 0.5], ["7.5deg", "-7.5deg"]);
      const rotateY = useTransform(mouseXSpring, [-0.5, 0.5], ["-7.5deg", "7.5deg"]);

      const handleMouseMove = (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const width = rect.width;
        const height = rect.height;
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        const xPct = mouseX / width - 0.5;
        const yPct = mouseY / height - 0.5;
        x.set(xPct);
        y.set(yPct);
        setIsHovered(true);
      };

      const handleMouseLeave = () => {
        x.set(0);
        y.set(0);
        setIsHovered(false);
      };

      const finalImageUrl = getImageUrl(image, id, isHovered);

      return (
        <motion.div
          style={{ rotateX, rotateY, transformStyle: "preserve-3d" }}
          onMouseMove={handleMouseMove}
          onMouseLeave={handleMouseLeave}
          onClick={onClick}
          className={`relative w-full rounded-[2rem] p-1 cursor-pointer group bg-gradient-to-b from-white to-zinc-50 border border-zinc-200 shadow-sm hover:shadow-2xl transition-shadow duration-500`}
        >
          <div className="absolute inset-0 bg-gradient-to-br from-blue-500/5 to-purple-500/5 rounded-[2rem] opacity-0 group-hover:opacity-100 transition-opacity duration-500" />
          
          <div className="relative bg-white rounded-[1.8rem] p-6 h-full flex flex-col z-10 overflow-hidden">
            <div className={`absolute -right-10 -top-10 w-32 h-32 rounded-full ${bg} opacity-50 blur-2xl group-hover:blur-3xl transition-all duration-500`} />
            
            {/* Image Preview Banner */}
            {finalImageUrl && (
              <div className="relative w-full h-44 rounded-2xl overflow-hidden mb-5 border border-zinc-100/80 shadow-inner z-20" style={{ transform: "translateZ(30px)" }}>
                <img 
                  src={finalImageUrl} 
                  alt={title} 
                  className="w-full h-full object-cover transition-transform duration-700 scale-100 group-hover:scale-105"
                  loading="lazy"
                />
                <div className="absolute inset-0 bg-gradient-to-t from-black/15 to-transparent pointer-events-none" />
              </div>
            )}

            <div className="flex justify-between items-start mb-6 relative z-20" style={{ transform: "translateZ(30px)" }}>
              <Badge className="bg-zinc-100 text-zinc-700 border border-zinc-200/50 shadow-sm">
                <Icon size={14} className="opacity-70"/> {subject}
              </Badge>
              <Badge className="bg-yellow-50 text-yellow-600 border border-yellow-200 shadow-sm">
                <Star size={14} fill="currentColor" /> {points}
              </Badge>
            </div>
            
            <div className="flex-grow relative z-20" style={{ transform: "translateZ(40px)" }}>
              <h3 className="text-2xl font-bold text-zinc-900 mb-2 group-hover:text-blue-600 transition-colors">{title}</h3>
              {description && (
                <p className="text-zinc-500 text-sm mb-4 line-clamp-2 leading-relaxed">{description}</p>
              )}
              <div className="flex items-center gap-4 text-sm text-zinc-500 font-medium">
                <span className="flex items-center gap-1.5"><User size={16}/> Lvl {level}</span>
                <span className="flex items-center gap-1.5"><Play size={16}/> {duration}</span>
              </div>
            </div>
            
            <div className="mt-8 flex items-center justify-between relative z-20" style={{ transform: "translateZ(20px)" }}>
              <div className="flex -space-x-3">
                {[1,2,3].map(i => (
                  <img key={i} src={`https://api.dicebear.com/7.x/avataaars/svg?seed=${i+title}&backgroundColor=e2e8f0`} className="w-10 h-10 rounded-full border-2 border-white shadow-sm" alt="player" />
                ))}
              </div>
              <div className="w-12 h-12 rounded-full bg-zinc-900 text-white flex items-center justify-center group-hover:bg-blue-600 group-hover:scale-110 transition-all duration-300 shadow-md">
                <Play size={20} fill="currentColor" className="ml-1"/>
              </div>
            </div>
          </div>
        </motion.div>
      );
    };

    // --- VIEWS ---
    const Landing = ({ onNavigate, games = [] }) => (
      <div className="min-h-screen pt-20">
        <section className="relative overflow-hidden px-4 sm:px-6 lg:px-8 py-20 lg:py-32 max-w-7xl mx-auto flex flex-col items-center text-center">
          
          {/* Animated Background Elements */}
          <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-gradient-to-tr from-blue-400/20 to-purple-400/20 rounded-full blur-[100px] -z-10 animate-pulse-slow" />
          <motion.div animate={{ y: [0, -20, 0], rotate: [0, 5, 0] }} transition={{ duration: 6, repeat: Infinity }} className="absolute top-20 left-10 lg:left-20 w-16 h-16 bg-blue-100 rounded-2xl rotate-12 blur-[2px] -z-10 flex items-center justify-center text-blue-500"><Gamepad2 size={32}/></motion.div>
          <motion.div animate={{ y: [0, 30, 0], rotate: [0, -10, 0] }} transition={{ duration: 8, repeat: Infinity }} className="absolute bottom-40 right-10 lg:right-32 w-24 h-24 bg-yellow-100 rounded-full blur-[2px] -z-10 flex items-center justify-center text-yellow-500"><Star size={40} fill="currentColor"/></motion.div>
          <motion.div animate={{ y: [0, -15, 0], x: [0, 15, 0] }} transition={{ duration: 7, repeat: Infinity }} className="absolute top-40 right-20 w-12 h-12 bg-purple-100 rounded-full blur-[1px] -z-10 flex items-center justify-center text-purple-500"><Brain size={24}/></motion.div>

          <div className="flex flex-col items-center gap-6 sm:gap-8 z-10 w-full">
            <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.5 }}>
              <span className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/80 backdrop-blur-md border border-zinc-200/50 text-zinc-800 font-bold text-sm shadow-sm">
                <Sparkles size={16} className="text-yellow-500"/> Nueva forma de aprender
              </span>
            </motion.div>
            
            <motion.h1 initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.5, delay: 0.1 }} className="text-5xl sm:text-6xl md:text-7xl lg:text-8xl font-black text-zinc-900 tracking-tight leading-[1.1] max-w-5xl">
              Descubre un <span className="gradient-text">universo</span> de conocimiento.
            </motion.h1>
            
            <motion.p initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.5, delay: 0.2 }} className="text-lg sm:text-xl text-zinc-600 max-w-2xl font-medium leading-relaxed">
              Plataforma premium de aprendizaje gamificado. Retos diarios, medallas y un catálogo infinito para entrenar tu mente de forma interactiva.
            </motion.p>
            
            <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.5, delay: 0.3 }} className="flex flex-col sm:flex-row gap-4 w-full sm:w-auto mt-4">
              <Button size="lg" onClick={() => onNavigate('catalog')} className="w-full sm:w-auto text-lg px-8 shadow-blue-500/40">Explorar Juegos <ArrowRight size={20}/></Button>
              <Button variant="secondary" size="lg" onClick={() => onNavigate('dashboard')} className="w-full sm:w-auto text-lg px-8">Ver Dashboard</Button>
            </motion.div>
          </div>

          <motion.div initial={{ opacity: 0, y: 40 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.8, delay: 0.5 }} className="w-full max-w-5xl mt-20 relative">
            <div className="absolute inset-0 bg-gradient-to-t from-[#f8fafc] via-transparent to-transparent z-20 h-full w-full pointer-events-none rounded-t-[2rem]" />
            <div className="glass-panel p-2 rounded-[2rem] shadow-2xl relative z-10 border border-white/40">
              <div className="bg-white rounded-[1.5rem] overflow-hidden border border-zinc-100 shadow-inner flex flex-col">
                {/* Fake Browser Chrome */}
                <div className="bg-zinc-50 border-b border-zinc-100 px-4 py-3 flex items-center gap-2">
                  <div className="w-3 h-3 rounded-full bg-red-400"></div>
                  <div className="w-3 h-3 rounded-full bg-yellow-400"></div>
                  <div className="w-3 h-3 rounded-full bg-green-400"></div>
                </div>
                <div className="p-6 md:p-10 bg-zinc-50 grid grid-cols-1 md:grid-cols-3 gap-6">
                  <div className="md:col-span-2 bg-white rounded-2xl p-6 shadow-sm border border-zinc-100 relative overflow-hidden group hover:border-blue-200 transition-colors">
                    <div className="absolute inset-0 bg-gradient-to-r from-blue-50 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <div className="relative z-10">
                      <div className="h-4 w-32 bg-zinc-200 rounded-full mb-6"></div>
                      <div className="space-y-3">
                        <div className="h-3 w-full bg-zinc-100 rounded-full"></div>
                        <div className="h-3 w-5/6 bg-zinc-100 rounded-full"></div>
                        <div className="h-3 w-4/6 bg-zinc-100 rounded-full"></div>
                      </div>
                      <div className="mt-8 grid grid-cols-2 gap-4">
                        <div className="h-24 bg-blue-50 rounded-xl border border-blue-100"></div>
                        <div className="h-24 bg-purple-50 rounded-xl border border-purple-100"></div>
                      </div>
                    </div>
                  </div>
                  <div className="bg-white rounded-2xl p-6 shadow-sm border border-zinc-100 flex flex-col items-center justify-center group hover:border-yellow-200 transition-colors relative overflow-hidden">
                    <div className="absolute inset-0 bg-gradient-to-b from-yellow-50 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <div className="w-24 h-24 rounded-full border-4 border-yellow-100 flex items-center justify-center mb-4 relative z-10">
                      <Trophy size={40} className="text-yellow-500 group-hover:scale-110 transition-transform" />
                    </div>
                    <div className="h-4 w-24 bg-zinc-200 rounded-full mb-2 relative z-10"></div>
                    <div className="h-3 w-16 bg-zinc-100 rounded-full relative z-10"></div>
                  </div>
                </div>
              </div>
            </div>
          </motion.div>
        </section>

        {/* Benefits Section */}
        <section className="py-24 bg-zinc-900 text-white px-6 lg:px-8 relative overflow-hidden">
          <div className="absolute top-0 left-0 w-full h-px bg-gradient-to-r from-transparent via-zinc-700 to-transparent"></div>

                    if (status !== 'idle') {
                      if (isCorrect) btnClass = "bg-green-50 border-2 border-green-500 text-green-700 shadow-md";
                      else if (isSelected) btnClass = "bg-red-50 border-2 border-red-500 text-red-700 shadow-md";
                      else btnClass = "bg-zinc-50 border-2 border-zinc-200 text-zinc-400 opacity-50";
                    }
                    return (
                      <button key={i} onClick={() => handleSelect(i)} disabled={status !== 'idle'} className={`relative p-8 rounded-[2rem] font-bold text-2xl transition-all duration-300 transform active:scale-95 ${btnClass}`}>
                        {opt}
                        {status !== 'idle' && isCorrect && <motion.div initial={{scale:0}} animate={{scale:1}} className="absolute -top-4 -right-4 bg-white rounded-full text-green-500 shadow-lg"><CheckCircle2 size={36} fill="currentColor" className="text-white bg-green-500 rounded-full"/></motion.div>}
                        {status !== 'idle' && isSelected && !isCorrect && <motion.div initial={{scale:0}} animate={{scale:1}} className="absolute -top-4 -right-4 bg-white rounded-full text-red-500 shadow-lg"><XCircle size={36} fill="currentColor" className="text-white bg-red-500 rounded-full"/></motion.div>}
                      </button>
                    )
                  })}
                </div>
                <AnimatePresence>
                  {status !== 'idle' && (
                    <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0 }} className="mt-12 flex justify-center">
                      <Button variant={status === 'correct' ? 'primary' : 'secondary'} size="lg" onClick={handleNext} className={`w-full sm:w-auto px-16 py-5 text-xl rounded-2xl ${status==='correct' ? 'bg-green-500 hover:bg-green-600 shadow-[0_8px_30px_rgb(34,197,94,0.3)]' : ''}`}>
                        {status === 'correct' ? '¡Excelente! Continuar' : 'Siguiente pregunta'} <ArrowRight className="ml-2"/>
                      </Button>
                    </motion.div>
                  )}
                </AnimatePresence>
              </motion.div>
            </AnimatePresence>
          </div>
        </div>
      );
    };

    const ParentsPanel = ({ onNavigate }) => {
      const students = [
        { name: "Leo", grade: "3º Básico", xp: 4500, time: "12h 30m", alert: false },

              </div>
              <div className="bg-white p-8 rounded-[2rem] shadow-sm border border-zinc-100 flex flex-col items-center justify-center text-center">
                <span className="text-zinc-500 font-bold uppercase tracking-wider text-sm mb-3">Materias Fuertes</span>
                <span className="text-3xl font-black text-zinc-900 flex items-center gap-3"><Zap className="text-yellow-500" size={32}/> Matemáticas</span>
              </div>
              <div className="bg-white p-8 rounded-[2rem] shadow-sm border border-zinc-100 flex flex-col items-center justify-center text-center">
                <span className="text-zinc-500 font-bold uppercase tracking-wider text-sm mb-3">Área a Reforzar</span>
                <span className="text-3xl font-black text-zinc-900 flex items-center gap-3"><BookOpen className="text-blue-500" size={32}/> Lectura</span>
              </div>
            </div>
            
            <h3 className="text-2xl font-bold text-zinc-900 mb-6">Progreso de Estudiantes</h3>
            <div className="bg-white rounded-[2rem] shadow-sm border border-zinc-100 overflow-hidden">
              <div className="divide-y divide-zinc-100">
                {students.map((student, i) => (
                  <div key={i} className="p-8 flex flex-col sm:flex-row sm:items-center justify-between gap-6 hover:bg-zinc-50/50 transition-colors">

                    <div className="flex items-center gap-10">
                      <div className="text-center"><div className="font-black text-2xl text-zinc-900">{student.xp}</div><div className="text-sm font-bold text-zinc-400 uppercase">XP</div></div>
                      <div className="text-center"><div className="font-black text-2xl text-zinc-900">{student.time}</div><div className="text-sm font-bold text-zinc-400 uppercase">Tiempo</div></div>
                      <Button variant="secondary">Ver Detalle</Button>

            </div>
          </div>

    };

    const ProfilePanel = ({ onNavigate }) => {
      return (
        <div className="min-h-screen pt-32 px-6 lg:px-8 bg-zinc-50 pb-20">
          <div className="max-w-4xl mx-auto">
            <div className="bg-white p-10 rounded-[3rem] shadow-sm border border-zinc-100 flex flex-col md:flex-row items-center gap-10 mb-12 relative overflow-hidden">
              <div className="absolute top-0 right-0 w-[400px] h-[400px] bg-gradient-to-bl from-blue-500/10 to-purple-500/10 rounded-full blur-[80px] -z-0 pointer-events-none"></div>
              <div className="relative z-10 w-40 h-40 bg-orange-100 rounded-[2.5rem] border-[6px] border-white shadow-xl overflow-hidden flex-shrink-0 rotate-3">
                <img src={MOCK_USER.avatar} alt="Avatar" className="w-full h-full object-cover" />
              </div>
              <div className="relative z-10 flex-grow text-center md:text-left">
                <h2 className="text-5xl font-black text-zinc-900 mb-4 tracking-tight">{MOCK_USER.name}</h2>
                <div className="flex flex-wrap items-center justify-center md:justify-start gap-3 mb-6">
                  <span className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-yellow-100 text-yellow-700 font-bold text-sm border border-yellow-200"><Trophy size={18}/> Nivel {MOCK_USER.level}</span>
                  <span className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-blue-100 text-blue-700 font-bold text-sm border border-blue-200"><Star size={18}/> {MOCK_USER.xp} XP</span>
                  <span className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-orange-100 text-orange-700 font-bold text-sm border border-orange-200"><Zap size={18}/> Racha {MOCK_USER.streak} días</span>
                </div>
                <div className="w-full bg-zinc-100 rounded-full h-3 mb-3 shadow-inner">
                  <div className="bg-gradient-to-r from-blue-500 to-cyan-400 h-3 rounded-full" style={{width: `${(MOCK_USER.xp / MOCK_USER.nextLevelXp) * 100}%`}}></div>
                </div>
                <p className="text-sm font-bold text-zinc-400 text-right uppercase tracking-wider">{MOCK_USER.nextLevelXp - MOCK_USER.xp} XP para subir de nivel</p>
              </div>
              <div className="relative z-10">
                <Button className="rounded-2xl">Editar Perfil</Button>
              </div>
            </div>
            
            <h3 className="text-2xl font-bold text-zinc-900 mb-6 flex items-center gap-3"><Award className="text-purple-500" size={28}/> Insignias Desbloqueadas</h3>
            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-6">
              {MOCK_USER.badges.map(b => (
                <motion.div key={b.id} whileHover={{y:-8, scale: 1.02}} className={`${b.bg} p-8 rounded-[2rem] flex flex-col items-center justify-center text-center cursor-pointer border border-white/50 shadow-sm hover:shadow-lg transition-all`}>
                  <b.icon size={40} className={`${b.color} mb-4`} />
                  <span className={`font-bold text-base ${b.color}`}>{b.name}</span>
                </motion.div>
              ))}
              <div className="bg-zinc-100 p-8 rounded-[2rem] flex flex-col items-center justify-center text-center border-2 border-zinc-200 border-dashed opacity-60">
                <Compass size={40} className="text-zinc-400 mb-4" />
                <span className="font-bold text-base text-zinc-500">Bloqueado</span>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const Navbar = ({ currentView, onNavigate, apiStatus, onOpenSettings }) => {
      const [scrolled, setScrolled] = useState(false);
      
      useEffect(() => {
        const handleScroll = () => setScrolled(window.scrollY > 20);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const navs = [
        { id: 'landing', label: 'Inicio' },
        { id: 'catalog', label: 'Juegos' },
        { id: 'dashboard', label: 'Mi Progreso' }
      ];

      return (
        <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${scrolled ? 'py-3' : 'py-5'}`}>
          <div className="px-4 sm:px-6 lg:px-8">
            <div className={`max-w-7xl mx-auto flex justify-between items-center transition-all duration-500 rounded-full px-6 ${scrolled ? 'bg-white/80 backdrop-blur-xl border border-zinc-200/50 shadow-lg py-3' : 'bg-transparent py-2'}`}>
              <div className="flex items-center gap-3 cursor-pointer group" onClick={() => onNavigate('landing')}>
                <div className="w-12 h-12 bg-gradient-to-tr from-blue-600 to-cyan-500 rounded-[14px] flex items-center justify-center text-white shadow-lg shadow-blue-500/30 group-hover:scale-105 group-hover:rotate-3 transition-transform"><Gamepad2 size={24} /></div>
                <span className="font-black text-2xl tracking-tight text-zinc-900 hidden sm:block">EduPlay</span>
              </div>
              
              <div className="hidden md:flex items-center gap-2">
                {navs.map(nav => (
                  <button key={nav.id} onClick={() => onNavigate(nav.id)} className={`px-5 py-2.5 rounded-full text-sm font-bold transition-all ${currentView === nav.id ? 'bg-zinc-900 text-white shadow-md' : 'text-zinc-500 hover:text-zinc-900 hover:bg-zinc-100/80'}`}>
                    {nav.label}
                  </button>
                ))}
              </div>
              
              <div className="flex items-center gap-4">
                {/* Indicador de Conexión de API */}
                <button 
                  onClick={onOpenSettings}
                  className="flex items-center gap-2 px-3 py-1.5 rounded-full border border-zinc-200/60 bg-zinc-50/50 hover:bg-zinc-100/80 transition-all text-xs font-bold shadow-sm"
                  title="Configuración de API"
                >
                  <span className={`w-2.5 h-2.5 rounded-full ${apiStatus === 'connected' ? 'bg-green-500 animate-pulse' : apiStatus === 'connecting' ? 'bg-yellow-500 animate-pulse' : 'bg-red-400'}`} />
                  <span className="text-zinc-600 hidden sm:inline">
                    {apiStatus === 'connected' ? 'API Conectada' : apiStatus === 'connecting' ? 'Conectando...' : 'API Desconectada'}
                  </span>
                </button>

                <div className="hidden lg:flex items-center gap-2">
                  <button className="text-sm font-bold text-zinc-500 hover:text-zinc-900 transition-colors px-3 py-2 rounded-lg" onClick={() => onNavigate('parents')}>Padres</button>
                  <button className="text-sm font-bold text-zinc-500 hover:text-zinc-900 transition-colors px-3 py-2 rounded-lg" onClick={() => onNavigate('profile')}>Perfil</button>
                </div>
                <Button size="md" className="rounded-full shadow-lg shadow-blue-500/20 px-8" onClick={() => onNavigate('catalog')}>Jugar Ahora</Button>
              </div>
            </div>
          </div>
        </nav>
      );
    }

    const App = () => {
      const [view, setView] = useState('landing');
      const [params, setParams] = useState({});
      
      // Estado de la API
      const [apiUrl, setApiUrl] = useState(() => localStorage.getItem('eduplay_api_url') || 'https://playhouse-strained-dimly.ngrok-free.dev');
      const [inputUrl, setInputUrl] = useState(() => localStorage.getItem('eduplay_api_url') || 'https://playhouse-strained-dimly.ngrok-free.dev');
      const [apiStatus, setApiStatus] = useState('disconnected'); // 'disconnected' | 'connecting' | 'connected'
      const [games, setGames] = useState(MOCK_GAMES);
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);

      const navigate = (newView, newParams = {}) => {
        setParams(newParams);
        setView(newView);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      // Función para conectar y cargar juegos de la API
      const loadApiGames = async (urlToTest) => {
        if (!urlToTest) {
          setGames(MOCK_GAMES);
          setApiStatus('disconnected');
          return false;
        }

        setApiStatus('connecting');
        
        // Limpiar URL y agregar protocolo si falta
        let cleanUrl = urlToTest.trim();
        if (!/^https?:\/\//i.test(cleanUrl)) {
          cleanUrl = 'http://' + cleanUrl;
        }

        try {
          // Remover diagonal final si la tiene
          cleanUrl = cleanUrl.replace(/\/$/, "");
          
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 5000); // 5s timeout

          // Manejar de forma inteligente si la URL ya incluye el path del endpoint
          let endpoint = cleanUrl;
          if (!cleanUrl.endsWith('/juegos') && !cleanUrl.endsWith('/games')) {
            endpoint = `${cleanUrl}/juegos`;
          }

          let res;
          try {
            res = await fetch(endpoint, { 
              mode: 'cors',
              signal: controller.signal
            });
          } catch (fetchErr) {
            // Si falla con /juegos, intentamos /games de respaldo en caso de que use la nomenclatura antigua
            if (endpoint.endsWith('/juegos')) {
              const fallbackEndpoint = endpoint.replace('/juegos', '/games');
              res = await fetch(fallbackEndpoint, {
                mode: 'cors',
                signal: controller.signal
              });
            } else {
              throw fetchErr;
            }
          }
          
          clearTimeout(timeoutId);

          if (!res.ok) throw new Error("Error en respuesta del servidor");
          const text = await res.text();
          let data;
          try {
            data = JSON.parse(text);
          } catch {
            data = parseApiResponsePayload(text);
          }
          if (!Array.isArray(data)) throw new Error("Formato de datos inesperado");

          const apiGamesMapped = data.map((g, index) => {
            const title = g.titulo || g.title || `Juego ${index + 1}`;
            const normalizedTitle = title.toLowerCase();
            const subject = normalizedTitle.includes('matem') ? 'Matemáticas'
              : normalizedTitle.includes('letras') ? 'Lectura'
              : normalizedTitle.includes('ciencia') || normalizedTitle.includes('explorador') ? 'Ciencias'
              : 'General';
            const icon = normalizedTitle.includes('matem') ? Zap
              : normalizedTitle.includes('letras') ? BookOpen
              : normalizedTitle.includes('ciencia') || normalizedTitle.includes('explorador') ? FlaskConical
              : Shield;

            return {
              id: `api-${g.id ?? index}`,
              title,
              subject,
              level: 'Todas',
              duration: g.duracion || '5 min',
              points: g.puntos ?? 100,
              color: subject === 'Matemáticas' ? 'from-blue-500 to-cyan-400' : subject === 'Lectura' ? 'from-red-500 to-pink-400' : 'from-green-500 to-emerald-400',
              bg: subject === 'Matemáticas' ? 'bg-blue-50' : subject === 'Lectura' ? 'bg-red-50' : 'bg-green-50',
              icon,
              image: g.imagen || g.image,
              description: g.descripcion || g.description || 'Explora este juego educativo.',
              isApi: true
            };
          });

          setGames([...apiGamesMapped, ...MOCK_GAMES]);
          setApiStatus('connected');
          return true;
        } catch (err) {
          console.error("Error al conectar con la API:", err);
          setGames(MOCK_GAMES);
          setApiStatus('disconnected');
          return false;
        }
      };

      // Intentar cargar al iniciar si hay una URL guardada
      useEffect(() => {
        if (apiUrl) {
          loadApiGames(apiUrl);
        }
      }, [apiUrl]);

      const handleTestConnection = async () => {
        await loadApiGames(inputUrl);
      };

      const handleSaveSettings = async () => {
        const success = await loadApiGames(inputUrl);
        localStorage.setItem('eduplay_api_url', inputUrl.trim());
        setApiUrl(inputUrl.trim());
        setIsSettingsOpen(false);
      };

      const views = {
        landing: <Landing onNavigate={navigate} games={games} />,
        catalog: <Catalog onNavigate={navigate} games={games} />,
        dashboard: <Dashboard onNavigate={navigate} />,
        game: <QuizGame onNavigate={navigate} gameId={params.gameId} />,
        parents: <ParentsPanel onNavigate={navigate} />,
        profile: <ProfilePanel onNavigate={navigate} />
      };

      return (
        <div className="w-full min-h-screen relative font-sans text-zinc-900 selection:bg-blue-200">
          <Navbar 
            currentView={view} 
            onNavigate={navigate} 
            apiStatus={apiStatus} 
            onOpenSettings={() => {
              setInputUrl(apiUrl);
              setIsSettingsOpen(true);
            }} 
          />
          
          <AnimatePresence mode="wait">
            <motion.div key={view} initial={{ opacity: 0, filter: 'blur(10px)' }} animate={{ opacity: 1, filter: 'blur(0px)' }} exit={{ opacity: 0, filter: 'blur(10px)' }} transition={{ duration: 0.4 }}>
              {views[view]}
            </motion.div>
          </AnimatePresence>

          {/* Modal de Configuración de API */}
          <AnimatePresence>
            {isSettingsOpen && (
              <motion.div 
                initial={{ opacity: 0 }} 
                animate={{ opacity: 1 }} 
                exit={{ opacity: 0 }} 
                className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-md"
                style={{ zIndex: 100 }}
              >
                <motion.div 
                  initial={{ scale: 0.95, y: 20 }} 
                  animate={{ scale: 1, y: 0 }} 
                  exit={{ scale: 0.95, y: 20 }}
                  transition={{ type: "spring", damping: 25, stiffness: 350 }}
                  className="bg-white rounded-[2.5rem] border border-zinc-100 p-8 md:p-10 w-full max-w-lg shadow-2xl relative"
                >
                  <button 
                    onClick={() => setIsSettingsOpen(false)} 
                    className="absolute top-6 right-6 w-10 h-10 rounded-full bg-zinc-100 hover:bg-zinc-200 text-zinc-500 flex items-center justify-center transition-colors"
                  >
                    <XCircle size={20} />
                  </button>

                  <div className="flex items-center gap-4 mb-6">
                    <div className="w-12 h-12 rounded-2xl bg-blue-50 text-blue-600 flex items-center justify-center">
                      <Globe size={24} />
                    </div>
                    <div>
                      <h3 className="text-2xl font-black text-zinc-900">Configuración de API</h3>
                      <p className="text-sm text-zinc-500 font-medium">Conecta el portal con el servidor FastAPI local</p>
                    </div>
                  </div>

                  <div className="space-y-6">
                    <div>
                      <label className="block text-sm font-bold text-zinc-700 mb-2">URL del Túnel Ngrok / Localhost</label>
                      <div className="relative">
                        <input 
                          type="text" 
                          value={inputUrl} 
                          onChange={(e) => setInputUrl(e.target.value)}
                          placeholder="https://xxxx-xxxx.ngrok-free.app" 
                          className="w-full px-5 py-4 rounded-2xl border-2 border-zinc-200 focus:border-blue-500 focus:outline-none font-medium transition-colors text-base"
                        />
                      </div>
                      <p className="text-xs text-zinc-400 mt-2 font-medium">Pega la URL pública generada por Ngrok (ej: `ngrok http 8000`).</p>
                    </div>

                    {/* Detalles de Estado de Conexión */}
                    <div className="p-5 rounded-2xl bg-zinc-50 border border-zinc-100">
                      <div className="flex items-center justify-between mb-3">
                        <span className="text-sm font-bold text-zinc-500">Estado de Conexión:</span>
                        <span className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-black uppercase tracking-wider ${apiStatus === 'connected' ? 'bg-green-100 text-green-700' : apiStatus === 'connecting' ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-700'}`}>
                          {apiStatus === 'connected' ? 'Conectado' : apiStatus === 'connecting' ? 'Probando...' : 'Desconectado'}
                        </span>
                      </div>
                      <p className="text-xs text-zinc-500 leading-relaxed font-medium">
                        {apiStatus === 'connected' 
                          ? '¡Excelente! Los juegos de la API han sido cargados e integrados al catálogo con éxito.' 
                          : apiStatus === 'connecting' 
                          ? 'Intentando contactar al servidor...' 
                          : 'Utilizando juegos locales (MOCK_GAMES) como respaldo por defecto.'}
                      </p>
                    </div>

                    <div className="flex gap-4">
                      <Button 
                        variant="secondary" 
                        onClick={handleTestConnection}
                        className="flex-1 py-4"
                        disabled={apiStatus === 'connecting'}
                      >
                        Probar Conexión
                      </Button>
                      <Button 
                        variant="primary" 
                        onClick={handleSaveSettings}
                        className="flex-1 py-4 shadow-blue-500/20"
                        disabled={apiStatus === 'connecting'}
                      >
                        Guardar y Cerrar
                      </Button>
                    </div>
                  </div>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
